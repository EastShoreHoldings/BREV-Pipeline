# Netlify configuration for the Bayou Pipeline SPA
# ------------------------------------------------
# Builds the Vite React app and serves the static dist/ directory.
# The SPA redirect ensures any deep-link URL (e.g. /map, /pipeline/123)
# falls through to index.html so client-side routing keeps working.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Cache control: let the built assets cache aggressively (Vite hashes filenames).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html should never be cached so users always get the latest shell.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA fallback — serve index.html for any unknown route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
