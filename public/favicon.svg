<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- BREV favicon: navy rounded tile with a white "B" monogram.
       Renders crisp at any size; browsers show it at 16-32px in the tab bar. -->
  <rect width="64" height="64" rx="12" ry="12" fill="#1B2A4A"/>
  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="central"
        font-family="Arial, Helvetica, sans-serif"
        font-size="44" font-weight="900" fill="#ffffff">B</text>
</svg>
